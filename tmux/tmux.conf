# Changer le prefix de ctrl-b à ctrl-w
unbind C-b
set-option -g prefix C-w
bind-key C-w send-prefix

# Navigation vim entre les panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Status line : path + branche git
set -g status-interval 5
set -g status-left ""
set -g status-right-length 100
set -g status-right '#(echo "#{pane_current_path}" | sed "s|$HOME|~|")#(cd "#{pane_current_path}" && git branch --show-current 2>/dev/null | sed "s/.*/ (&)/")  #(cat /sys/class/power_supply/BAT0/capacity)%% %H:%M'

# Bordures de pane : épaisses et blanches pour la pane active
set -g pane-border-lines heavy
set -g pane-active-border-style fg=white,bold
set -g pane-border-style fg=colour240

# Scroll avec la souris
set -g mouse on

# Mode vi pour la sélection + copie dans le clipboard
setw -g mode-keys vi
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Continuum : restore auto au démarrage, save toutes les 10 min
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Initialiser TPM (garder en dernière ligne)
run '~/.tmux/plugins/tpm/tpm'
